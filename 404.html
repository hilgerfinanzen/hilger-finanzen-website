<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Seite nicht gefunden - Hilger Finanzen</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    :root {
      --navy: #0B1D2E;
      --copper: #1A6BB8;
      --text: #1E2A36;
      --muted: #6B7280;
      --cream: #F7F4EF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--cream);
    }
    main {
      width: min(100%, 620px);
      text-align: center;
    }
    img {
      height: 54px;
      width: auto;
      margin-bottom: 2.5rem;
      background: white;
      padding: 6px 14px;
      border-radius: 4px;
    }
    .eyebrow {
      margin-bottom: 1rem;
      color: var(--copper);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    h1 {
      margin-bottom: 1rem;
      color: var(--navy);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.35rem, 9vw, 4rem);
      font-weight: 500;
      line-height: 1.05;
    }
    p {
      margin: 0 auto 2rem;
      max-width: 34rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.85rem 1.4rem;
      border-radius: 3px;
      background: var(--copper);
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="/images/logo.png" alt="Hilger Finanzen">
    <div class="eyebrow">404</div>
    <h1>Diese Seite gibt es nicht.</h1>
    <p>Die gesuchte Adresse ist nicht vorhanden oder wurde verschoben. Auf der Startseite finden Sie alle wichtigen Informationen zur Beratung.</p>
    <a href="/">Zur Startseite</a>
  </main>
</body>
</html>
